<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMON LABORATORY - Banner Isolation Test</title>
    <link rel="stylesheet" href="/src/styles/theme.css">
    <style>
        body { background: #fff; padding: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .lab-header { margin-bottom: 50px; text-align: center; font-family: 'Inter', sans-serif; }
        .lab-status { color: #00ff00; font-family: monospace; margin-bottom: 20px; }
        .banner-info { border: 2px dashed #ff00ff; width: 100%; max-width: 1000px; } /* Resaltamos el banner para verlo si está vacío */
    </style>
</head>
<body>

    <div class="lab-header">
        <div class="lab-status">● RESONANCE LABORATORY ACTIVE</div>
        <h1>Aislamiento de Proyección: BANNER</h1>
        <p>Si el recuadro punteado está vacío, la materia no está llegando al Actor.</p>
    </div>

    <!-- Contenedor para React -->
    <div id="root"></div>

    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import { SovereignProvider } from '/src/score/SovereignContext.jsx';
        import { BannerInfo } from '/src/ui/components/BannerInfo.jsx';

        const TestApp = () => {
            const mockDefinition = {
                meta: {
                    component_id: 'banner_info',
                    component_type: 'banner_info',
                    materia_id: 'ideas-que-echan-raices-acciones-que-transforman'
                }
            };

            return React.createElement(SovereignProvider, null, 
                React.createElement(BannerInfo, { definition: mockDefinition })
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(TestApp));
    </script>

</body>
</html>
